<title>AutoParis — Painel Lucas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8a84b;
    --accent2: #e8c96a;
    --text: #f0f0f5;
    --text2: #8888a0;
    --green: #4caf7d;
    --red: #e05555;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 10px; letter-spacing: 0; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { font-size: 12px; color: var(--text2); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .add-client-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group {
    display: flex;
    gap: 6px;
  }

  input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text2); }

  .btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }

  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.97); }

  .btn-sm {
    padding: 6px 10px;
    font-size: 11px;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid transparent;
    padding: 4px 6px;
    font-size: 14px;
  }

  .btn-danger:hover { background: rgba(224,85,85,0.1); }

  /* CLIENT LIST */
  .client-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .client-list::-webkit-scrollbar { width: 4px; }
  .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .client-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
    position: relative;
    border: 1px solid transparent;
  }

  .client-card:hover { background: var(--surface2); }

  .client-card.active {
    background: rgba(200, 168, 75, 0.08);
    border-color: rgba(200, 168, 75, 0.3);
  }

  .client-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b6914);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #0a0a0f;
    flex-shrink: 0;
  }

  .client-info { flex: 1; min-width: 0; }

  .client-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .client-phone {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .client-badge {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: #0a0a0f;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .chat-client-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-client-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  .chat-client-phone { font-size: 12px; color: var(--text2); }

  .chat-actions { display: flex; gap: 8px; }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.client { align-self: flex-end; align-items: flex-end; }
  .msg.lucas { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    position: relative;
  }

  .msg.client .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.lucas .msg-bubble {
    background: rgba(200, 168, 75, 0.1);
    border: 1px solid rgba(200, 168, 75, 0.25);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-time {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
  }

  .copy-btn {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(200, 168, 75, 0.15);
    border: none;
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 10px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .msg.lucas .msg-bubble:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: rgba(200, 168, 75, 0.3); }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    gap: 12px;
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text2);
  }

  .empty-sub { font-size: 13px; }

  /* INPUT AREA */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); }

  .send-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    width: 44px; height: 44px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* LOADING */
  .typing {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: rgba(200, 168, 75, 0.08);
    border: 1px solid rgba(200, 168, 75, 0.2);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* NO CLIENT SELECTED */
  .no-client {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text2);
  }

  .no-client-icon {
    font-size: 56px;
    opacity: 0.15;
  }

  .no-client-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text2);
    opacity: 0.5;
  }

  .no-client-sub { font-size: 13px; opacity: 0.4; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    animation: slideUp 0.2s ease;
    z-index: 1000;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .platform-tag {
    font-size: 11px;
    background: rgba(200,168,75,0.1);
    border: 1px solid rgba(200,168,75,0.2);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    width: 100%;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  /* TABS */
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .nav-tab {
    background: transparent;
    border: none;
    color: var(--text2);
    padding: 7px 18px;
    border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-tab.active { background: var(--accent); color: #0a0a0f; }

  /* VIEWS */
  .view-active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .view-hidden { display: none; flex: 1; overflow-y: auto; }

  /* ADMIN PANEL */
  .admin-panel {
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  .admin-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .admin-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }

  .period-selector select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    width: auto;
  }

  .admin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .admin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .admin-card.wide { grid-column: 1 / -1; }
  .admin-card.highlight { border-color: rgba(200,168,75,0.3); background: rgba(200,168,75,0.05); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .kpi-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .kpi-value.accent { color: var(--accent); }
  .kpi-value.green { color: var(--green); }

  .kpi-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
  }

  /* INVESTMENT */
  .invest-grid { display: flex; flex-direction: column; gap: 10px; }

  .invest-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .invest-label { font-size: 13px; color: var(--text); font-weight: 500; }

  .invest-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .currency { font-size: 12px; color: var(--accent); font-weight: 600; }

  .invest-input-wrap input {
    background: transparent;
    border: none;
    color: var(--text);
    width: 90px;
    font-size: 13px;
    text-align: right;
    padding: 2px 0;
  }

  /* CHANNEL TABLE */
  .ch-table { width: 100%; border-collapse: collapse; }
  .ch-table th {
    text-align: left;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
  }
  .ch-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .ch-table tr:last-child td { border-bottom: none; }
  .ch-table tr:hover td { background: var(--surface2); }

  .roi-positive { color: var(--green); font-weight: 700; }
  .roi-negative { color: var(--red); font-weight: 700; }
  .roi-neutral { color: var(--text2); }

  /* REVENUE LIST */
  .rev-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .rev-entry:last-child { border-bottom: none; }
  .rev-entry select, .rev-entry input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
  }
  .rev-entry select { flex: 2; }
  .rev-entry input { flex: 1; }
  .rev-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 4px; }

  /* SUB TABS */
  .sub-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .sub-tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text2);
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .sub-tab:hover { color: var(--text); }
  .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .subtab-content { display: none; }
  .subtab-content.active-sub { display: block; }

  /* IMPORT ZONE */
  .import-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .import-zone:hover { border-color: var(--accent); background: rgba(200,168,75,0.03); }
  .import-icon { font-size: 36px; margin-bottom: 10px; }
  .import-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .import-sub { font-size: 12px; color: var(--text2); }

  /* BAR CHART */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; padding: 0 4px; }
  .bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 28px; }
  .bar { background: var(--accent); border-radius: 4px 4px 0 0; width: 100%; transition: opacity 0.2s; min-height: 2px; }
  .bar:hover { opacity: 0.7; }
  .bar-label { font-size: 9px; color: var(--text2); margin-top: 4px; text-align: center; white-space: nowrap; overflow: hidden; max-width: 32px; text-overflow: ellipsis; }
  .bar-val { font-size: 9px; color: var(--text2); margin-bottom: 2px; }

  /* MINI TABLE */
  .mini-table { width: 100%; border-collapse: collapse; }

const SYSTEM_PROMPT = `Você é o Lucas, a Inteligência Artificial da AutoParis, atuando como consultor técnico no WhatsApp e Instagram.

# PAPEL
Seu papel é atender clientes da AutoParis com linguagem profissional, cordial, clara e objetiva, conduzindo o atendimento até o agendamento confirmado.

# OBJETIVO
Conduzir o cliente desde a triagem até o agendamento confirmado, seguindo sempre esta ordem:
nome → menu → coleta do veículo → pesquisa web → investigação → valor percebido → preço → **CONFIRMAÇÃO DO SERVIÇO** → link → CONFIRMADO → fechamento

Nunca pule etapas. Nunca envie o link antes da confirmação do serviço.

# TOM E ESTILO
- Profissional, confiante e humano
- Frases curtas, diretas, sem rodeios
- Sem gírias, sem termos informais como "cravar"
- Sem excessos como "com certeza!" ou "claro!" repetitivos

# REGRA CRÍTICA — CÂMBIO COM SINTOMAS
NUNCA orientar troca de fluido de câmbio quando o veículo apresenta sintomas (demora para engatar, hesitação, tremor, troca estranha de marcha).
Trocar o fluido não resolve problema — pode mascarar ou agravar uma falha.
O caminho correto é sempre o diagnóstico eletrônico primeiro.
Após o diagnóstico confirmar que não há problema subjacente, a troca do fluido pode ser realizada.
Antes da troca, fazemos triagem: retiramos amostra do fluido. Se houver limalha ou contaminação relevante, não prosseguimos.

# AR-CONDICIONADO
Problemas de ar-condicionado envolvem sempre componentes mecânicos E controle eletrônico via módulos e sensores. Por isso, o diagnóstico de entrada é sempre o eletrônico (R$ 1.120,00).
- Se o diagnóstico identificar causa eletrônica: valor NÃO abate
- Se o diagnóstico identificar causa mecânica (vazamento, compressor físico, etc.): valor ABATE no orçamento do reparo mecânico

# VALOR PERCEBIDO — ESTRUTURA OBRIGATÓRIA E ORDEM DO PREÇO

REGRA CRÍTICA DE ORDEM: O preço NUNCA é o primeiro elemento. O preço é o ÚLTIMO item apresentado, depois que o valor percebido estiver completamente construído. O cliente precisa chegar no preço já convencido do valor — não descobrir o preço antes de entender o que está comprando.

Ordem obrigatória em toda apresentação de serviço:
1. Reconhecer o problema usando os próprios sintomas relatados pelo cliente
2. Explicar o risco de agir sem investigação correta
3. Apresentar o que a AutoParis faz de diferente (método, transparência, documentação)
4. Conectar com o resultado: o cliente vai sair sabendo o que tem, com decisão fundamentada
5. Somente DEPOIS de tudo isso: informar o preço, condições de pagamento e CTA

Nunca use texto genérico igual para todos. Personalize sempre com os sintomas do cliente.
Se o cliente perguntar o preço diretamente antes da investigação, responda: "Antes de te passar o valor, preciso entender melhor o seu caso para garantir que estou te indicando o serviço certo." — e continue a investigação.

# MÓDULO DE OBJEÇÕES
## "Tá caro"
Reconheça, reposicione o valor. Mostre que o diagnóstico evita trocar peça por tentativa — o que costuma custar muito mais.

Explique a diferença entre scanner básico e análise técnica completa com documentação. Não ataque a concorrência.

Seja leve. Lembre que a agenda é limitada e as vagas fecham. Deixe a porta aberta.

A AutoParis não pratica descontos. Explique que a qualidade exige margem, e ofereça parcelamento em até 6x sem juros.

# CORREIA DENTADA
Quando o veículo estiver próximo de 60.000 km ou mais, orientar sobre correia dentada se o motor usar correia.
Nunca inventar preço de correia. Se o cliente demonstrar interesse, encaminhar para consultor.

# PRESENÇA CONSTANTE — REGRA DE OURO
O Lucas está sempre presente para o cliente, em qualquer situação.

- Se o cliente fugir do assunto: reconheça o que ele disse com atenção genuína, responda brevemente se for algo simples, e traga de volta ao fluxo com naturalidade — nunca ignore o que ele falou
- Se o cliente estiver frustrado ou impaciente: valide o sentimento dele antes de qualquer coisa, mostre que está do lado dele
- Se o cliente fizer uma pergunta que está fora do escopo da AutoParis: responda com o que sabe, seja honesto quando não souber, e ofereça encaminhar para a equipe
- Se o cliente demorar para responder e voltar depois: retome o contexto com leveza, sem cobrar
- Se o cliente mandar áudio transcrito, mensagem confusa ou com erros: interprete com inteligência, organize a resposta com clareza e nunca demonstre impaciência
- Nunca deixe o cliente sem resposta
- Nunca seja frio, mecânico ou indiferente
- O cliente tem que sentir que está falando com alguém que se importa com ele e com o carro dele

let clients = [];
let activeClientId = null;
const DB_KEY = 'autoparis_clients_db';

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function now() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

// BANCO DE DADOS — salva todos os clientes no storage persistente

function saveDB() {
  try {
    const data = clients.map(c => ({
      id: c.id, name: c.name, phone: c.phone, platform: c.platform,
      messages: c.messages.filter(m => m.role !== 'typing'),
      unread: c.unread || 0, source: c.source || 'Não informado',
      status: c.status || null, lastService: c.lastService || null,
      lastValue: c.lastValue || null, lastObs: c.lastObs || null,
      closedAt: c.closedAt || null, archived: c.archived || false,
      createdAt: c.createdAt || new Date().toISOString(),
      lastSeen: new Date().toISOString()
    }));
    localStorage.setItem(DB_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Storage save error:', e); }
}

function loadDB() {
  // Load from localStorage first (instant)
  try {
    const result = localStorage.getItem(DB_KEY);
    if (result) {
      const data = JSON.parse(result);
      clients = data.map(c => ({ ...c, unread: c.unread || 0 }));
      renderSidebar();
      showToast('📂 ' + clients.length + ' cliente(s) carregado(s)');
    }
  } catch(e) {}
  // Firebase real-time sync will override if configured
}

function normalizePhone(phone) {
  return phone.replace(/\D/g, '');
}

function addClient() {
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const platform = document.getElementById('clientPlatform').value;

  if (!name) { showToast('Digite o nome do cliente'); return; }

  const normalizedPhone = normalizePhone(phone);

  // VERIFICAR SE CLIENTE JÁ EXISTE no banco de dados
  const existing = clients.find(c => {
    const samePhone = normalizedPhone && normalizePhone(c.phone) === normalizedPhone;
    const sameName = c.name.toLowerCase() === name.toLowerCase();
    return samePhone || sameName;
  });

  if (existing) {
    // Cliente já existe — carrega histórico
    selectClient(existing.id);
    const msgCount = existing.messages.filter(m => m.role !== 'typing').length;
    showToast('👤 Cliente encontrado! ' + msgCount + ' mensagem(s) no histórico');
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    return;
  }

  const source = document.getElementById('clientSource').value;

  const client = {
    id: generateId(),
    name,
    phone: phone || 'Sem número',
    platform,
    source: source || 'Não informado',
    messages: [],
    unread: 0,
    createdAt: new Date().toISOString(),
    lastSeen: new Date().toISOString()
  };

  clients.push(client);
  document.getElementById('clientName').value = '';
  document.getElementById('clientPhone').value = '';
  document.getElementById('clientSource').value = 'Não informado';
  saveDB();
  renderSidebar();
  selectClient(client.id);
  showToast('✅ Novo cliente adicionado ao banco de dados');
}

function removeClient(id) {
  clients = clients.filter(c => c.id !== id);
  if (activeClientId === id) {
    activeClientId = null;
    renderChatEmpty();
  }
  saveDB();
  renderSidebar();
}

function selectClient(id) {
  activeClientId = id;
  clients.forEach(c => { if (c.id === id) c.unread = 0; });
  renderSidebar();
  renderChat();
}

function isClientActive(c) {
  // Active = no status yet, or status is "Aguardando aprovação" or "Não fechou"
  return !c.status || c.status === 'Aguardando aprovação' || c.status === 'Não fechou';
}

function archiveClient(id) {
  const client = clients.find(c => c.id === id);
  if (!client) return;
  client.archived = true;
  if (activeClientId === id) {
    activeClientId = null;
    renderChatEmpty();
  }
  saveDB();
  renderSidebar();
  showToast('✅ Conversa arquivada');
}

function unarchiveClient(id) {
  const client = clients.find(c => c.id === id);
  if (!client) return;
  client.archived = false;
  client.status = null;
  client.closedAt = null;
  client.lastService = null;
  client.lastValue = null;
  saveDB();
  renderSidebar();
  selectClient(id);
  showToast('🔄 Conversa reaberta — histórico mantido');
}

function closeNewClientPanel() {
  document.getElementById('new-client-panel').style.display = 'none';
  document.getElementById('sidebarSearch').value = '';
}

function handleSidebarSearch(query) {
  const dropdown = document.getElementById('sidebar-search-dropdown');
  if (!query || query.length < 1) { dropdown.style.display = 'none'; return; }

  const q = query.toLowerCase();

  // Search in ALL clients (including archived)
  const matches = clients.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.phone && c.phone.replace(/\D/g,'').includes(q.replace(/\D/g,'')))
  ).slice(0, 8);

  const hasExactMatch = matches.some(c =>
    c.name.toLowerCase() === q || normalizePhone(c.phone) === normalizePhone(query)
  );

  let html = '';

  if (matches.length > 0) {
    html += matches.map(c => {
      const isArch = c.archived || (c.status === 'Agendado' || c.status === 'Serviço concluído');
      const msgCount = (c.messages||[]).filter(m=>m.role!=='typing').length;
      return `<div class="sidebar-dd-item" onclick="${isArch ? `reopenFromSearch('${c.id}')` : `selectFromSearch('${c.id}')`}">
        <div class="client-avatar" style="width:28px;height:28px;font-size:10px;flex-shrink:0;">${getInitials(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:var(--text);">${c.name}</div>
          <div style="font-size:11px;color:var(--text2);">${c.platform} · ${c.phone}</div>
          ${c.source && c.source !== 'Não informado' ? `<div style="font-size:10px;color:var(--accent);">📍 ${c.source}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${isArch
            ? `<div style="font-size:10px;color:var(--green);font-weight:600;">📦 Arquivado</div>
               <div style="font-size:10px;color:var(--text2);">${msgCount} msgs</div>`
            : `<div style="font-size:10px;color:var(--accent);font-weight:600;">💬 Ativo</div>
               <div style="font-size:10px;color:var(--text2);">${msgCount} msgs</div>`
          }
        </div>
      </div>`;
    }).join('');
  }

  if (!hasExactMatch) {
    html += `<div class="sidebar-dd-item sidebar-dd-new" onclick="showNewClientPanel('${query.replace(/'/g,"\\'")}')">
      <div style="font-size:20px;">➕</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);">Novo cliente: "${query}"</div>
        <div style="font-size:11px;color:var(--text2);">Clique para preencher os dados</div>
      </div>
    </div>`;
  }
